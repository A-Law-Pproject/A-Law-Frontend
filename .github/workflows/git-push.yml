name: git push into another repo to deploy to vercel

on:
  push:
    branches:
      - '**' # 모든 브랜치 감지
  delete:     # 브랜치 삭제 감지

jobs:
  # 1. 푸시/업데이트 시 실행되는 Job
  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: pandoc/latex
    steps:
      - uses: actions/checkout@v3

      - name: Install ruby and mustache
        run: apk add ruby && gem install mustache

      - name: creates output
        run: sh ./build.sh

      - name: Pushes to another repository (Auto Create Branch)
        env:
          PERSONAL_TOKEN: ${{ secrets.AUTO_ACTIONS }}
        run: |
          # output 디렉토리가 생성되었는지 확인
          if [ ! -d "output" ]; then
            echo "Error: 'output' directory not found."
            exit 1
          fi

          cd output
          
          # Git 초기화 및 설정
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 현재 파일들을 커밋으로 생성
          git add .
          git commit -m "${{ github.event.head_commit.message }}" || echo "No changes to commit"
          
          # 핵심 명령어: 대상 리포지토리에 현재 브랜치 이름(${{ github.ref_name }})으로 강제 푸시
          git push "https://${PERSONAL_TOKEN}@github.com/missyou2/A-Law-FE-Debug.git" HEAD:refs/heads/${{ github.ref_name }} --force

      - name: Debug Output
        run: echo "Successfully pushed to branch ${{ github.ref_name }}"

  # 2. 브랜치 삭제 시 실행되는 Job
  delete-branch:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Delete remote branch
        env:
          PERSONAL_TOKEN: ${{ secrets.AUTO_ACTIONS }}
        run: |
          BRANCH_NAME=${{ github.event.ref }}
          
          # 메인 브랜치 삭제 방지 안전장치
          if [ "$BRANCH_NAME" == "main" ] || [ "$BRANCH_NAME" == "master" ]; then
            echo "Main branch deletion skipped."
            exit 0
          fi
          
          echo "Deleting $BRANCH_NAME from destination repository..."
          REMOTE_REPO="https://${PERSONAL_TOKEN}@github.com/missyou2/A-Law-FE-Debug.git"
          
          # 대상 리포지토리에서 해당 브랜치 삭제 (없어도 에러내지 않음)
          git push $REMOTE_REPO --delete $BRANCH_NAME || echo "Branch already gone."
