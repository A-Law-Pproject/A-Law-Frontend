name: git push into another repo to deploy to vercel

on:
  push:
    branches:
      - '**' # 모든 브랜치 감지
  delete:     # 브랜치 삭제 감지

jobs:
  # 1. 푸시/업데이트 시 실행되는 Job
  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: pandoc/latex
    steps:
      - uses: actions/checkout@v3

      - name: Install ruby and mustache
        run: apk add ruby && gem install mustache

      - name: creates output
        run: sh ./build.sh

      - name: Pushes to another repository (Auto Create Branch)
        env:
          PERSONAL_TOKEN: ${{ secrets.AUTO_ACTIONS }}
        run: |
          # 1. output 디렉토리로 이동
          cd output
          
          # 2. git 설정
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 3. 파일 스테이징 및 커밋
          git add .
          git commit -m "${{ github.event.head_commit.message }}"
          
          # 4. 강제 푸시 (브랜치가 없으면 원격에 생성함)
          # destination-repository: missyou2/A-Law-FE-Debug
          git push "https://${PERSONAL_TOKEN}@github.com/missyou2/A-Law-FE-Debug.git" HEAD:refs/heads/${{ github.ref_name }} --force

  # 2. 브랜치 삭제 시 실행되는 Job
  delete-branch:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Delete remote branch
        env:
          PERSONAL_TOKEN: ${{ secrets.AUTO_ACTIONS }}
        run: |
          BRANCH_NAME=${{ github.event.ref }}
          
          if [ "$BRANCH_NAME" == "main" ]; then
            echo "Main branch deletion skipped."
            exit 0
          fi
          
          echo "Deleting $BRANCH_NAME from destination..."
          REMOTE_REPO="https://${PERSONAL_TOKEN}@github.com/missyou2/A-Law-FE-Debug.git"
          # 해당 브랜치가 존재할 때만 삭제 시도
          git push $REMOTE_REPO --delete $BRANCH_NAME || true
