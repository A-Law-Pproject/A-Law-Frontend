name: git push into another repo to deploy to vercel

on:
  push:
    branches:
      - '**' # 모든 브랜치 감지
  delete:     # 브랜치 삭제 감지

jobs:
  # 1. 푸시/업데이트 시 실행되는 Job
  build-and-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: pandoc/latex
    steps:
      - uses: actions/checkout@v3
      
      - name: Install mustache (to update the date)
        run: apk add ruby && gem install mustache
        
      - name: creates output
        run: sh ./build.sh
        
      - name: Pushes to another repository
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.AUTO_ACTIONS }}
        with:
          source-directory: 'output'
          destination-github-username: missyou2
          destination-repository-name: A-Law-FE-Debug
          user-email: ${{ secrets.EMAIL }}
          commit-message: ${{ github.event.head_commit.message }}
          # 핵심 수정: 현재 푸시된 브랜치 이름과 동일한 이름으로 개인 리포에 푸시
          target-branch: ${{ github.ref_name }}
          
      - name: Debug Output
        run: echo "Pushed to branch ${{ github.ref_name }}"

  # 2. 브랜치 삭제 시 실행되는 Job
  delete-branch:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Delete remote branch
        env:
          PERSONAL_TOKEN: ${{ secrets.AUTO_ACTIONS }} # 위와 동일한 토큰 사용
        run: |
          # 삭제된 브랜치 이름 가져오기
          BRANCH_NAME=${{ github.event.ref }}
          
          # 메인 브랜치는 삭제 방지 (안전 장치)
          if [ "$BRANCH_NAME" == "main" ]; then
            echo "Main branch deletion skipped."
            exit 0
          fi
          
          echo "Deleting $BRANCH_NAME from destination..."
          REMOTE_REPO="https://${PERSONAL_TOKEN}@github.com/(내 유저이름)/(내 개인 리포이름).git"
          git push $REMOTE_REPO --delete $BRANCH_NAME || echo "Branch already gone."
